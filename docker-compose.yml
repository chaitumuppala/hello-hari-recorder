services:
  app:
    build: .
    ports:
      - "7860:7860"
    environment:
      - SCAM_ASR_ENGINE=hybrid
      - SCAM_WHISPER_MODEL=distil-small.en
      - SCAM_DEBUG=true
      # For IndicConformer (gated model) — set your HuggingFace token:
      # - HF_TOKEN=hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    volumes:
      # Persist HuggingFace model cache across rebuilds
      - hf_cache:/app/hf_cache
      # Persist SQLite data
      - app_data:/app/data

volumes:
  hf_cache:
  app_data:
